name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run backend database migrations before final service update
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare runtime files
        run: |
          cp /home/farewell/deploy-runtime/perch-mount/.env .env
          mkdir -p secrets
          cp /home/farewell/deploy-runtime/perch-mount/secrets/flask_secret secrets/flask_secret
          cp /home/farewell/deploy-runtime/perch-mount/secrets/jwt_secret secrets/jwt_secret

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull latest images
        run: docker compose --env-file .env -f docker-compose.deploy.yml pull

      - name: Start infrastructure services
        run: docker compose --env-file .env -f docker-compose.deploy.yml up -d postgres redis

      - name: Run backend migrations
        if: github.event_name == 'push' || inputs.run_migrations
        run: docker compose --env-file .env -f docker-compose.deploy.yml run --rm backend flask --app run.py db upgrade

      - name: Restart application services
        run: docker compose --env-file .env -f docker-compose.deploy.yml up -d frontend backend --remove-orphans
